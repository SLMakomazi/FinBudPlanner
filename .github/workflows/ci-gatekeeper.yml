name: CI Gatekeeper

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}

    steps:

    ##################################################
    # Checkout
    ##################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ##################################################
    # Required CI Inputs
    ##################################################

    - name: Validate Required CI Inputs
      run: |
        test -n "${SECRET_KEY}"
        test -f backend/requirements.txt
        test -f backend/Dockerfile
        test -f backend/tests/test_selenium_regression.py
        test -f frontend/package-lock.json
        test -f frontend/tsconfig..json
        test -f frontend/src/test.ts
        test -f database/performance_profile.jmx

    ##################################################
    # Python
    ##################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip

    ##################################################
    # Node
    ##################################################

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    ##################################################
    # Chrome (Angular + Selenium)
    ##################################################

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Configure Chrome Binary
      run: |
        CHROME_BIN_PATH="$(command -v chrome)"
        test -x "${CHROME_BIN_PATH}"
        echo "CHROME_BIN=${CHROME_BIN_PATH}" >> "${GITHUB_ENV}"

    ##################################################
    # Docker Buildx
    ##################################################

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    ##################################################
    # Backend Dependencies
    ##################################################

    - name: Install Backend Dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest selenium webdriver-manager

    ##################################################
    # Backend Tests
    ##################################################

    - name: Run Backend Unit Tests
      working-directory: backend
      run: |
        PYTHONPATH=. pytest tests -v --ignore=tests/test_selenium_regression.py

    ##################################################
    # Frontend Dependencies
    ##################################################

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm ci

    ##################################################
    # Angular Tests
    ##################################################

    - name: Run Angular Tests
      working-directory: frontend
      run: npx ng test --configuration=ci

    ##################################################
    # Build Docker Images
    ##################################################

    - name: Build Backend Image
      run: |
        docker build \
          -t finbud-backend:latest \
          ./backend

    - name: Build Frontend Image
      run: |
        docker build \
          --no-cache \
          -t finbud-frontend:latest \
          ./frontend

    ##################################################
    # Start Containers
    ##################################################

    - name: Start Backend
      run: |
        docker run -d \
          --name backend-test \
          -e SECRET_KEY="${SECRET_KEY}" \
          -p 8000:8000 \
          finbud-backend:latest

        if [ "$(docker inspect -f '{{.State.Running}}' backend-test)" != "true" ]; then
          docker logs backend-test
          exit 1
        fi

    - name: Start Frontend
      run: |
        docker run -d \
          --name frontend-test \
          -p 80:80 \
          finbud-frontend:latest

        if [ "$(docker inspect -f '{{.State.Running}}' frontend-test)" != "true" ]; then
          docker logs frontend-test
          exit 1
        fi

    ##################################################
    # Wait for Backend
    ##################################################

    - name: Wait for Backend
      run: |
        for i in {1..30}; do
          if [ "$(docker inspect -f '{{.State.Running}}' backend-test)" != "true" ]; then
            docker logs backend-test
            exit 1
          fi

          if curl -fs http://localhost:8000/health; then
            echo "Backend ready."
            exit 0
          fi

          echo "Waiting for backend..."
          sleep 2
        done

        docker logs backend-test || true
        exit 1

    ##################################################
    # Wait for Frontend
    ##################################################

    - name: Wait for Frontend
      run: |
        for i in {1..30}; do
          if [ "$(docker inspect -f '{{.State.Running}}' frontend-test)" != "true" ]; then
            docker logs frontend-test
            exit 1
          fi

          if curl -fs http://localhost; then
            echo "Frontend ready."
            exit 0
          fi

          echo "Waiting for frontend..."
          sleep 2
        done

        docker logs frontend-test || true
        exit 1

    ##################################################
    # Selenium Tests
    ##################################################

    - name: Run Selenium Regression Tests
      working-directory: backend
      run: python tests/test_selenium_regression.py

    ##################################################
    # Install Apache JMeter
    ##################################################

    - name: Install Apache JMeter
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          openjdk-17-jre \
          wget \
          unzip

        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.zip

        unzip apache-jmeter-5.6.3.zip

        echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

    ##################################################
    # Verify JMeter
    ##################################################

    - name: Verify JMeter
      run: jmeter --version

    ##################################################
    # Run JMeter
    ##################################################

    - name: Run JMeter Performance Test
      run: |
        jmeter \
          -n \
          -t database/performance_profile.jmx \
          -JHOST=localhost \
          -JPORT=8000 \
          -l results.jtl \
          -e \
          -o jmeter-report

    ##################################################
    # Upload JMeter Report
    ##################################################

    - name: Upload JMeter Report
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-report
        if-no-files-found: ignore
        path: |
          results.jtl
          jmeter-report

    ##################################################
    # Upload Selenium Artifacts
    ##################################################

    - name: Upload Selenium Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-artifacts
        if-no-files-found: ignore
        path: |
          backend/screenshots
          backend/logs

    ##################################################
    # Print Docker Logs on Failure
    ##################################################

    - name: Backend Logs
      if: failure()
      run: docker logs backend-test || true

    - name: Frontend Logs
      if: failure()
      run: docker logs frontend-test || true

    ##################################################
    # Cleanup
    ##################################################

    - name: Stop Containers
      if: always()
      run: |
        docker stop backend-test || true
        docker stop frontend-test || true

        docker rm backend-test || true
        docker rm frontend-test || true

    ##################################################
    # Login GHCR
    ##################################################

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    ##################################################
    # Push Backend
    ##################################################

    - name: Build and Push Backend
      uses: docker/build-push-action@v6
      with:
        context: backend
        file: backend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest

    ##################################################
    # Push Frontend
    ##################################################

    - name: Build and Push Frontend
      uses: docker/build-push-action@v6
      with:
        context: frontend
        file: frontend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
